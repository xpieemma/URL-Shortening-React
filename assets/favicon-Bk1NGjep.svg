<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="20" fill="hsl(257, 27%, 26%)"/>
  <!-- Link chain icon -->
  <g transform="translate(50,50) rotate(-45)">
    <!-- Left link -->
    <rect x="-32" y="-12" width="28" height="24" rx="12" fill="none" stroke="hsl(180, 66%, 49%)" stroke-width="8"/>
    <!-- Right link -->
    <rect x="4" y="-12" width="28" height="24" rx="12" fill="none" stroke="hsl(180, 66%, 49%)" stroke-width="8"/>
    <!-- Gap fill left -->
    <rect x="-16" y="-4" width="14" height="8" fill="hsl(257, 27%, 26%)"/>
    <!-- Gap fill right -->
    <rect x="2" y="-4" width="14" height="8" fill="hsl(257, 27%, 26%)"/>
  </g>
</svg>
